server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location /api/customers {
        proxy_pass http://customers-api:8080;
        proxy_set_header Host $host;
    }

    location /api/orders {
        proxy_pass http://orders-api:8080;
        proxy_set_header Host $host;
    }
}
