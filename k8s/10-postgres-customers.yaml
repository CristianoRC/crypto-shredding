apiVersion: v1
kind: Secret
metadata:
  name: postgres-customers-secret
  namespace: crypto-shredding
type: Opaque
stringData:
  POSTGRES_DB: customersdb
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-customers-pvc
  namespace: crypto-shredding
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-customers
  namespace: crypto-shredding
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-customers
  template:
    metadata:
      labels:
        app: postgres-customers
    spec:
      containers:
        - name: postgres
          image: postgres:17
          envFrom:
            - secretRef:
                name: postgres-customers-secret
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 3
            periodSeconds: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-customers-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-customers
  namespace: crypto-shredding
spec:
  selector:
    app: postgres-customers
  ports:
    - port: 5432
      targetPort: 5432
