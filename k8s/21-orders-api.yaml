apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
  namespace: crypto-shredding
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders-api
  template:
    metadata:
      labels:
        app: orders-api
    spec:
      initContainers:
        - name: wait-postgres-orders
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres-orders 5432; do echo waiting for postgres-orders; sleep 1; done"]
        - name: wait-customers-api
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z customers-api 8080; do echo waiting for customers-api; sleep 1; done"]
      containers:
        - name: orders-api
          image: orders-api:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Development"
            - name: ConnectionStrings__OrdersDb
              value: "Host=postgres-orders;Port=5432;Database=ordersdb;Username=postgres;Password=postgres"
            - name: Services__CustomersApiBaseUrl
              value: "http://customers-api:8080/"
---
apiVersion: v1
kind: Service
metadata:
  name: orders-api
  namespace: crypto-shredding
spec:
  selector:
    app: orders-api
  ports:
    - port: 8080
      targetPort: 8080
