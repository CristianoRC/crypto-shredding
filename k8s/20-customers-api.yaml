apiVersion: apps/v1
kind: Deployment
metadata:
  name: customers-api
  namespace: crypto-shredding
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customers-api
  template:
    metadata:
      labels:
        app: customers-api
    spec:
      initContainers:
        - name: wait-postgres-customers
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres-customers 5432; do echo waiting for postgres-customers; sleep 1; done"]
        - name: wait-postgres-customers-keys
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres-customers-keys 5432; do echo waiting for postgres-customers-keys; sleep 1; done"]
        - name: wait-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z redis 6379; do echo waiting for redis; sleep 1; done"]
      containers:
        - name: customers-api
          image: customers-api:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Development"
            - name: ConnectionStrings__CustomersDb
              value: "Host=postgres-customers;Port=5432;Database=customersdb;Username=postgres;Password=postgres"
            - name: ConnectionStrings__KeyVault
              value: "Host=postgres-customers-keys;Port=5432;Database=keyvault;Username=postgres;Password=postgres"
            - name: ConnectionStrings__Redis
              value: "redis:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: customers-api
  namespace: crypto-shredding
spec:
  selector:
    app: customers-api
  ports:
    - port: 8080
      targetPort: 8080
